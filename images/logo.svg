<svg width="100%" viewBox="-110 -20 220 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AD monogram favicon logo for Ashlesh Dhanvalkar</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Three sizes of the AD monogram logo shown side by side: 512px, 192px, and 32px favicon sizes</desc>

  <g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    
    <!-- Changed background rect to a perfect circle -->
    <circle cx="0" cy="90" r="100" fill="#0A1628" style="fill:rgb(10, 22, 40);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    
    <!-- Adjusted top accent bar to clip into the circular frame -->
    <path d="M -43.5 -10 L 43.5 -10 A 100 100 0 0 1 43.5 -4 L -43.5 -4 Z" fill="#D4A843" style="fill:rgb(212, 168, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    
    <circle cx="0" cy="90" r="72" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.25" style="fill:none;stroke:rgb(212, 168, 67);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    
    <text x="-18" y="118" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#F5F0E8" text-anchor="middle" dominant-baseline="auto" style="fill:rgb(245, 240, 232);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:96px;font-weight:700;text-anchor:middle;dominant-baseline:auto">A</text>
    
    <text x="30" y="118" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#D4A843" text-anchor="middle" dominant-baseline="auto" opacity="0.95" style="fill:rgb(212, 168, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:Georgia, serif;font-size:96px;font-weight:700;text-anchor:middle;dominant-baseline:auto">D</text>
    
    <circle cx="72" cy="48" r="6" fill="#D4A843" style="fill:rgb(212, 168, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    
    <!-- Adjusted bottom text banner to align cleanly with the circular shape -->
    <path d="M -66 165 L 66 165 A 100 100 0 0 1 43.5 185 L -43.5 185 A 100 100 0 0 1 -66 165 Z" fill="#D4A843" opacity="0.12" style="fill:rgb(212, 168, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="0" y="175" font-family="var(--font-sans)" font-size="9" fill="#D4A843" text-anchor="middle" letter-spacing="2.5" font-weight="500" style="fill:rgb(212, 168, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:9px;font-weight:500;text-anchor:middle;dominant-baseline:auto">REACT ENGINEER</text>
  </g>
</svg>



